version: 2

project_name: cloak-agent

before:
  hooks:
    - go mod tidy

builds:
  - id: cloak-agent
    main: .
    binary: cloak-agent
    ldflags:
      - -s -w -X github.com/nerveband/cloak-agent/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
      - zip
    formats_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: nerveband
    name: cloak-agent
  draft: false
  prerelease: auto
